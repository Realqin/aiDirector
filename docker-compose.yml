services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: aidirector
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
    environment:
      APP_NAME: aiDirector
      APP_ENV: dev
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@db:5432/aidirector
      REDIS_URL: redis://redis:6379/0
      API_PREFIX: /api/v1
    depends_on:
      - db
      - redis
    ports:
      - "8000:8000"

  frontend:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    depends_on:
      - backend
    ports:
      - "5173:5173"

volumes:
  pg_data:
